<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Events — The E Chronicles</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .page-hero{background:var(--surface);border-bottom:1px solid var(--border);padding:3.5rem 2.5rem 3rem}
    .page-hero-inner{max-width:1100px;margin:0 auto}
    .events-section{padding:3rem 2.5rem 5rem}
    .events-inner{max-width:1100px;margin:0 auto}

    /* filter tabs */
    .filter-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:2rem}
    .ftab{padding:.4rem 1rem;font-size:.78rem;font-weight:500;border-radius:100px;border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .2s}
    .ftab:hover,.ftab.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

    /* special countdown card */
    .event-countdown-card{
      background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
      border-radius:16px;padding:2rem;color:#fff;margin-bottom:1.2rem;
      position:relative;overflow:hidden;
      animation:fadeUp .5s ease both;
    }
    .event-countdown-card::before{
      content:'';position:absolute;inset:0;
      background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='28' fill='none' stroke='rgba(255,255,255,0.06)' stroke-width='1'/%3E%3C/svg%3E") repeat;
    }
    .ecc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;position:relative}
    .ecc-badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:100px;padding:.2rem .75rem;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase}
    .ecc-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;margin:.6rem 0 .3rem;position:relative}
    .ecc-meta{font-size:.82rem;opacity:.8;position:relative}
    .ecc-countdown{display:flex;gap:.6rem;margin-top:1.2rem;flex-wrap:wrap;position:relative}
    .ecc-unit{background:rgba(0,0,0,.2);border-radius:8px;padding:.6rem .8rem;min-width:58px;text-align:center}
   .ecc-num{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:700;line-height:1}
    .ecc-label{font-size:.6rem;opacity:.7;letter-spacing:.1em;text-transform:uppercase;margin-top:.2rem}

    /* regular event card */
    .event-card{
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      padding:1.4rem 1.5rem;margin-bottom:.9rem;
      display:flex;gap:1.2rem;align-items:flex-start;
      transition:border-color .2s,transform .2s,box-shadow .2s;
      animation:fadeUp .4s ease both;
    }
    .event-card:hover{border-color:var(--accent);transform:translateX(4px);box-shadow:var(--shadow)}
    .event-date-box{
      flex-shrink:0;background:var(--bg2);border:1px solid var(--border);
      border-radius:10px;padding:.7rem .9rem;text-align:center;min-width:56px;
    }
    .edb-day{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:700;line-height:1;color:var(--accent)}
    .edb-month{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-top:.2rem}
    .event-info{flex:1}
    .event-title{font-weight:600;font-size:.95rem;margin-bottom:.25rem}
    .event-meta{font-size:.78rem;color:var(--text3);margin-bottom:.5rem;display:flex;gap:1rem;flex-wrap:wrap}
    .event-desc{font-size:.82rem;color:var(--text2);line-height:1.6}
    .event-tag{
      display:inline-block;padding:.15rem .55rem;border-radius:4px;
      font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;
    }
    .tag-upcoming{background:rgba(34,197,94,.1);color:#16a34a;border:1px solid rgba(34,197,94,.2)}
    .tag-past{background:var(--bg2);color:var(--text3);border:1px solid var(--border)}
    .tag-special{background:rgba(201,162,39,.1);color:var(--gold);border:1px solid rgba(201,162,39,.2)}

    .empty-state{text-align:center;padding:4rem 2rem;color:var(--text3);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.2rem}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:600px){.page-hero,.events-section{padding-left:1.25rem;padding-right:1.25rem}.event-meta{gap:.5rem}}
  </style>
</head>
<body>
<div class="page">
  <div class="page-hero">
    <div class="page-hero-inner reveal">
      <div class="section-label">// What's happening</div>
      <h1 class="section-title">Events</h1>
      <p class="section-desc">Exams, trips, gatherings and everything in between. Stay in the loop.</p>
    </div>
  </div>
  <section class="events-section">
    <div class="events-inner">
      <div class="filter-tabs reveal" id="filterTabs">
        <button class="ftab active" data-f="all">All</button>
        <button class="ftab" data-f="upcoming">Upcoming</button>
        <button class="ftab" data-f="past">Past</button>
        <button class="ftab" data-f="special">Special</button>
      </div>
      <div id="eventsContainer" class="reveal reveal-delay-1"></div>
    </div>
  </section>
</div>
<script src="shared.js"></script>
<script>
injectNav();

// ── EVENTS DATA (editable from admin panel) ──
// status: 'upcoming' | 'past' | 'special' (special = has countdown)
const EVENTS_DEFAULT = [
  { id:1, title:"Grade 12 Begins", date:"2026-06-16", time:"9:30 AM", venue:"St. Xavier's College", desc:"First day of Grade 12 — the final chapter begins!", status:"special" },
  { id:2, title:"NEB Board Exams", date:"2027-03-20", time:"7:00 AM", venue:"Examination Centre", desc:"National Examinations Board — our big moment.", status:"special" },
  { id:3, title:"Section E Orientation", date:"2025-08-01", time:"10:00 AM", venue:"Main Hall", desc:"Welcome session for all new Section E students.", status:"past" },
  { id:4, title:"First Internal Exam", date:"2025-10-15", time:"9:45 AM", venue:"Section E Classroom", desc:"First internal assessment of Grade 11.", status:"past" },
];

// _siteData holds admin data loaded from GitHub via loadSiteData()
let _siteData = {};
let EVENTS = [];
let currentFilter = 'all';

function renderEvents() {
  const container = document.getElementById('eventsContainer');
  const now = new Date();
  const filtered = currentFilter === 'all' ? EVENTS : EVENTS.filter(e => e.status === currentFilter);

  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state">No events to show here yet.</div>';
    return;
  }

  container.innerHTML = '';
  filtered.forEach((ev, i) => {
    const d = new Date(ev.date);
    const day = d.getDate();
    const month = d.toLocaleString('default',{month:'short'});

    if (ev.status === 'special') {
      const div = document.createElement('div');
      div.className = 'event-countdown-card';
      div.style.animationDelay = (i*0.08)+'s';
      div.innerHTML = `
        <div class="ecc-top">
          <div><span class="ecc-badge">⭐ Special Event</span>
          <div class="ecc-title">${ev.title}</div>
          <div class="ecc-meta">📅 ${d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})} &nbsp;·&nbsp; ${ev.time} &nbsp;·&nbsp; 📍 ${ev.venue}</div></div>
        </div>
        <div class="ecc-countdown" id="ecc-${ev.id}">
          <div class="ecc-unit"><div class="ecc-num" id="d-${ev.id}">--</div><div class="ecc-label">Days</div></div>
          <div class="ecc-unit"><div class="ecc-num" id="h-${ev.id}">--</div><div class="ecc-label">Hrs</div></div>
          <div class="ecc-unit"><div class="ecc-num" id="m-${ev.id}">--</div><div class="ecc-label">Min</div></div>
          <div class="ecc-unit"><div class="ecc-num" id="s-${ev.id}">--</div><div class="ecc-label">Sec</div></div>
        </div>
        <p style="margin-top:.8rem;opacity:.85;font-size:.85rem;position:relative">${ev.desc}</p>`;
      container.appendChild(div);
      // start countdown — pass raw string so getCountdown() parses as local midnight
      function tick() {
        const c = getCountdown(ev.date + 'T00:00:00+05:45');
        if (c.passed) { document.getElementById(`ecc-${ev.id}`).innerHTML = '<span style="font-size:1rem;opacity:.8">🎉 This event has passed!</span>'; return; }
        document.getElementById(`d-${ev.id}`).textContent = String(c.days).padStart(2,'0');
        document.getElementById(`h-${ev.id}`).textContent = String(c.hours).padStart(2,'0');
        document.getElementById(`m-${ev.id}`).textContent = String(c.mins).padStart(2,'0');
        document.getElementById(`s-${ev.id}`).textContent = String(c.secs).padStart(2,'0');
      }
      tick(); setInterval(tick, 1000);
    } else {
      const tagClass = ev.status === 'upcoming' ? 'tag-upcoming' : 'tag-past';
      const tagLabel = ev.status === 'upcoming' ? 'Upcoming' : 'Past';
      const div = document.createElement('div');
      div.className = 'event-card';
      div.style.animationDelay = (i*0.07)+'s';
      div.innerHTML = `
        <div class="event-date-box"><div class="edb-day">${day}</div><div class="edb-month">${month}</div></div>
        <div class="event-info">
          <div class="event-title">${ev.title} <span class="event-tag ${tagClass}">${tagLabel}</span></div>
          <div class="event-meta"><span>🕐 ${ev.time}</span><span>📍 ${ev.venue}</span></div>
          <div class="event-desc">${ev.desc}</div>
        </div>`;
      container.appendChild(div);
    }
  });
}

document.getElementById('filterTabs').addEventListener('click', e => {
  const btn = e.target.closest('.ftab');
  if (!btn) return;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.f;
  renderEvents();
});

// Wait for GitHub admin data before rendering
(async function init() {
  _siteData = await loadSiteData();
  // Prefer admin data from GitHub, then localStorage, then hardcoded defaults
  EVENTS = (_siteData.events && _siteData.events.length)
    ? _siteData.events
    : (JSON.parse(localStorage.getItem('ec_events') || 'null') || EVENTS_DEFAULT);
  renderEvents();
})();
</script>
</body>
</html>
