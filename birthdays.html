<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Birthdays — The E Chronicles</title>
<link rel="stylesheet" href="style.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,700&family=Space+Grotesk:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════════════════════════
   BIRTHDAYS — Lavender · Purple · Yellow · Crazy edition
══════════════════════════════════════════════════════════════ */
:root{
  --lav-50:#faf7ff;
  --lav-100:#f1e8ff;
  --lav-200:#e2d2ff;
  --lav-300:#c9aaff;
  --lav-400:#b794f4;
  --lav-500:#9f7aea;
  --lav-600:#7c3aed;
  --purple-700:#6b21a8;
  --purple-800:#4c1d95;
  --purple-900:#2e1065;
  --yellow-300:#fde047;
  --yellow-400:#facc15;
  --yellow-500:#eab308;
  --amber:#fbbf24;
  --ink:#1b0e3a;
  --ink-2:#3b2570;
  --ink-3:#6b5b94;
  --bg:#fbf8ff;
  --surface:#ffffff;
  --border:rgba(124,58,237,.16);
  --shadow-soft:0 12px 40px -12px rgba(76,29,149,.18);
  --shadow-pop:0 24px 60px -18px rgba(76,29,149,.45);
  --grad-aurora:conic-gradient(from 0deg,#fde047,#b794f4,#7c3aed,#fbbf24,#c9aaff,#fde047);
  --grad-soft:linear-gradient(135deg,#f1e8ff 0%,#fff8dc 100%);
  --radius:20px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Space Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.page{min-height:100vh;position:relative;overflow-x:hidden}

/* ── PAGE AMBIENT BACKDROP (animated mesh) ── */
.page::before{
  content:"";position:fixed;inset:-20%;z-index:0;pointer-events:none;
  background:
    radial-gradient(45% 35% at 12% 18%, rgba(183,148,244,.45), transparent 60%),
    radial-gradient(35% 30% at 88% 8%,  rgba(253,224,71,.35), transparent 60%),
    radial-gradient(40% 35% at 80% 90%, rgba(124,58,237,.30), transparent 65%),
    radial-gradient(30% 25% at 5% 80%,  rgba(251,191,36,.28), transparent 60%);
  filter:blur(40px);
  animation:meshDrift 22s ease-in-out infinite alternate;
}
@keyframes meshDrift{
  0%  {transform:translate(0,0) rotate(0deg)}
  50% {transform:translate(2%,-2%) rotate(2deg)}
  100%{transform:translate(-2%,2%) rotate(-2deg)}
}
.page > *{position:relative;z-index:1}

/* ── HERO ── */
.bday-hero{
  padding:5.5rem 2.5rem 4.5rem;
  position:relative;overflow:hidden;
  border-bottom:1px dashed rgba(124,58,237,.18);
}
.bday-hero-bg{display:none}
.bday-hero-inner{max-width:1180px;margin:0 auto;position:relative;z-index:2}
.section-label{
  display:inline-flex;align-items:center;gap:.5rem;
  font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--lav-600);
  padding:.4rem .85rem;border:1px solid rgba(124,58,237,.25);
  border-radius:999px;background:rgba(255,255,255,.7);backdrop-filter:blur(8px);
}
.bday-hero h1{
  font-family:'Fraunces',serif;
  font-size:clamp(3rem,8vw,6.5rem);
  font-weight:900;line-height:.95;letter-spacing:-.03em;
  margin:1.2rem 0 .6rem;color:var(--ink);
}
.bday-hero h1 em{
  font-style:italic;font-weight:700;
  background:linear-gradient(120deg,var(--lav-600) 0%,var(--amber) 50%,var(--lav-500) 100%);
  background-size:200% 200%;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:gradientShift 6s ease-in-out infinite;
  position:relative;
}
@keyframes gradientShift{
  0%,100%{background-position:0% 50%}
  50%    {background-position:100% 50%}
}
.section-desc{
  font-size:1.1rem;line-height:1.65;color:var(--ink-2);max-width:560px;margin-top:1rem;
}

/* Hero floating emojis */
.hero-floaters{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.floater{
  position:absolute;font-size:1.6rem;opacity:.55;
  animation:floatUp linear infinite;
  filter:drop-shadow(0 4px 10px rgba(124,58,237,.25));
}
@keyframes floatUp{
  0%  {transform:translateY(0) rotate(0)   scale(1);   opacity:0}
  20% {opacity:.6}
  100%{transform:translateY(-260px) rotate(40deg) scale(1.15); opacity:0}
}

/* ── TODAY BANNER ── */
.today-banner{
  background:linear-gradient(110deg,var(--lav-100) 0%,#fff7c5 50%,var(--lav-100) 100%);
  background-size:200% 100%;
  border:1.5px solid transparent;
  border-radius:var(--radius);
  padding:1.1rem 1.5rem;
  display:flex;align-items:center;gap:1rem;
  margin-bottom:2rem;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-soft);
  animation:bannerShimmer 4s linear infinite, bannerPulse 2.4s ease-in-out infinite;
}
.today-banner::before{
  content:"";position:absolute;inset:-2px;border-radius:inherit;padding:2px;
  background:var(--grad-aurora);background-size:300% 300%;
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  animation:auroraSpin 6s linear infinite;
  pointer-events:none;
}
@keyframes bannerShimmer{0%{background-position:0% 0%}100%{background-position:200% 0%}}
@keyframes bannerPulse{0%,100%{box-shadow:0 12px 40px -12px rgba(124,58,237,.25)}50%{box-shadow:0 18px 50px -10px rgba(251,191,36,.45)}}
@keyframes auroraSpin{to{background-position:300% 0%}}
.today-banner-icon{font-size:1.9rem;animation:wiggle 1.8s ease-in-out infinite}
@keyframes wiggle{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(12deg) scale(1.1)}}
.today-banner-text{flex:1;color:var(--ink);font-weight:500}
.today-banner-text strong{color:var(--lav-600)}

/* ── BODY LAYOUT ── */
.bday-body{padding:1rem 2.5rem 6rem}
.bday-body-inner{max-width:1180px;margin:0 auto}
.bday-layout{display:grid;grid-template-columns:340px 1fr;gap:2.2rem;align-items:start}
@media (max-width:900px){.bday-layout{grid-template-columns:1fr}}

/* ── SIDEBAR ── */
.bday-sidebar{position:sticky;top:1.5rem}
.sidebar-card{
  background:var(--surface);
  border-radius:calc(var(--radius) + 4px);
  padding:1.4rem;
  border:1px solid var(--border);
  box-shadow:var(--shadow-soft);
  position:relative;overflow:hidden;
}
.sidebar-card::before{
  content:"";position:absolute;top:-50%;right:-30%;width:200px;height:200px;
  background:radial-gradient(circle,rgba(253,224,71,.35),transparent 70%);
  filter:blur(20px);pointer-events:none;
}
.sidebar-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;position:relative}
.sidebar-header-title{font-family:'Fraunces',serif;font-weight:700;font-size:1.3rem;color:var(--ink);flex:1}
.sidebar-header-badge{
  font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  background:linear-gradient(135deg,var(--lav-600),var(--lav-500));color:#fff;
  padding:.3rem .65rem;border-radius:999px;
  box-shadow:0 4px 12px -4px rgba(124,58,237,.5);
}
.upcoming-items{display:flex;flex-direction:column;gap:.55rem;position:relative}
.upcoming-item{
  display:flex;align-items:center;gap:.85rem;
  padding:.75rem .85rem;border-radius:14px;cursor:pointer;
  background:var(--lav-50);
  border:1px solid transparent;
  transition:all .25s cubic-bezier(.4,0,.2,1);
}
.upcoming-item:hover{
  background:linear-gradient(135deg,var(--lav-100),#fff7c5);
  border-color:rgba(124,58,237,.3);
  transform:translateX(4px);
  box-shadow:0 8px 20px -8px rgba(124,58,237,.35);
}
.upcoming-item.is-soon{
  background:linear-gradient(135deg,#fff3a8,var(--lav-100));
  border-color:rgba(251,191,36,.5);
  animation:soonGlow 2.4s ease-in-out infinite;
}
@keyframes soonGlow{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,.4)}50%{box-shadow:0 0 0 8px rgba(251,191,36,0)}}
.days-pill{
  min-width:54px;text-align:center;padding:.45rem .3rem;border-radius:12px;
  background:linear-gradient(135deg,var(--lav-600),var(--purple-800));
  color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 6px 14px -6px rgba(76,29,149,.5);
}
.is-soon .days-pill{background:linear-gradient(135deg,var(--amber),#f97316)}
.days-num{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:800;line-height:1}
.days-lbl{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;opacity:.85;margin-top:2px}
.ui-name{font-weight:600;color:var(--ink)}
.ui-date{font-size:.78rem;color:var(--ink-3);margin-top:2px}
.upcoming-empty{text-align:center;padding:1.4rem;color:var(--ink-3);font-style:italic}

/* ── MAIN: BY MONTH ── */
.month-section{margin-bottom:2.4rem}
.month-header{display:flex;align-items:center;gap:1rem;margin-bottom:1rem}
.month-name{
  font-family:'Fraunces',serif;font-size:1.6rem;font-weight:700;
  color:var(--ink);letter-spacing:-.01em;
  background:linear-gradient(120deg,var(--purple-800),var(--lav-600));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.month-line{flex:1;height:2px;background:linear-gradient(90deg,var(--lav-300),transparent);border-radius:2px}
.month-count{font-size:.75rem;font-weight:600;color:var(--lav-600);letter-spacing:.08em;text-transform:uppercase}
.month-chips{display:flex;flex-wrap:wrap;gap:.7rem}
.bday-chip{
  display:inline-flex;align-items:center;gap:.55rem;padding:.55rem .95rem;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:999px;cursor:pointer;
  font-size:.92rem;color:var(--ink);
  transition:all .22s cubic-bezier(.4,0,.2,1);
  position:relative;
  box-shadow:0 4px 10px -6px rgba(76,29,149,.15);
}
.bday-chip:hover{
  background:linear-gradient(135deg,var(--lav-100),#fff7c5);
  border-color:var(--lav-400);
  transform:translateY(-3px) scale(1.04);
  box-shadow:0 12px 24px -10px rgba(124,58,237,.4);
}
.chip-day{
  font-family:'Fraunces',serif;font-weight:800;font-size:1.05rem;
  color:var(--lav-600);min-width:22px;
}
.chip-name{font-weight:500}
.today-chip{
  background:linear-gradient(135deg,#fde047,var(--lav-300))!important;
  border-color:var(--amber)!important;
  color:var(--purple-900)!important;font-weight:700;
  animation:todayChipPulse 1.6s ease-in-out infinite;
}
@keyframes todayChipPulse{
  0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(251,191,36,.6)}
  50%    {transform:scale(1.06);box-shadow:0 0 0 10px rgba(251,191,36,0)}
}
.chip-today-dot{
  width:8px;height:8px;border-radius:50%;background:#f43f5e;
  box-shadow:0 0 0 4px rgba(244,63,94,.25);animation:todayChipPulse 1.4s infinite;
}

/* ── REVEAL ── */
.reveal{opacity:0;transform:translateY(20px);transition:all .7s cubic-bezier(.2,.7,.2,1)}
.reveal.visible{opacity:1;transform:none}
.reveal-delay-1{transition-delay:.15s}

/* ══════════════════════════════════════════════════════════════
   POPUP OVERLAY
══════════════════════════════════════════════════════════════ */
.bday-overlay{
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,rgba(46,16,101,.85),rgba(15,5,30,.95));
  backdrop-filter:blur(14px);
  opacity:0;pointer-events:none;
  transition:opacity .4s ease;
  padding:1.5rem;
}
.bday-overlay.open{opacity:1;pointer-events:auto}
.hidden{display:none!important}

/* ──────────────────────────────────────────────
   TYPE 1 · TODAY — HOLOGRAPHIC PRISM EXPLOSION
────────────────────────────────────────────── */
.card-today-wrapper{
  position:relative;width:min(560px,94vw);
  animation:ctDrop .7s cubic-bezier(.2,1.4,.4,1) both;
  perspective:1200px;
}
@keyframes ctDrop{
  0%  {opacity:0;transform:scale(.5) rotate(-10deg)}
  60% {opacity:1;transform:scale(1.05) rotate(2deg)}
  100%{opacity:1;transform:scale(1) rotate(0)}
}
.ct-ring{
  position:absolute;inset:-40px;border-radius:32px;
  background:var(--grad-aurora);background-size:300% 300%;
  filter:blur(28px);opacity:.85;z-index:-1;
  animation:auroraSpin 5s linear infinite;
}
.card-today{
  background:linear-gradient(160deg,#1a0533 0%,#2e1065 60%,#1a0533 100%);
  border-radius:28px;overflow:hidden;
  border:1.5px solid rgba(183,148,244,.25);
  box-shadow:0 40px 80px -20px rgba(0,0,0,.7),
             inset 0 1px 0 rgba(255,255,255,.08);
  position:relative;
  transform-style:preserve-3d;
}
.card-today::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:var(--grad-aurora);background-size:200% 200%;
  opacity:.12;mix-blend-mode:screen;
  animation:auroraSpin 8s linear infinite;
}
.ct-balloons{
  position:absolute;top:-25px;left:0;right:0;display:flex;justify-content:space-around;
  z-index:5;pointer-events:none;
}
.ct-balloons span{
  font-size:2.2rem;
  filter:drop-shadow(0 6px 12px rgba(0,0,0,.4));
  animation:balloonBob 3s ease-in-out infinite;
}
.ct-balloons span:nth-child(1){animation-delay:0s}
.ct-balloons span:nth-child(2){animation-delay:.3s}
.ct-balloons span:nth-child(3){animation-delay:.6s}
.ct-balloons span:nth-child(4){animation-delay:.9s}
.ct-balloons span:nth-child(5){animation-delay:1.2s}
@keyframes balloonBob{
  0%,100%{transform:translateY(0) rotate(-4deg)}
  50%    {transform:translateY(-14px) rotate(6deg)}
}
.ct-photo-frame{
  position:relative;height:340px;overflow:hidden;
  background:linear-gradient(135deg,#1a0533,#0a1a3a);
}
.ct-aurora{
  position:absolute;inset:0;pointer-events:none;z-index:1;
  background:var(--grad-aurora);background-size:200% 200%;
  mix-blend-mode:overlay;opacity:.45;
  animation:auroraSpin 6s linear infinite;
}
.ct-photo-overlay{
  position:absolute;inset:0;z-index:3;pointer-events:none;
  background:linear-gradient(to bottom,transparent 40%,rgba(26,5,51,.9) 100%);
}
.ct-star{
  position:absolute;z-index:4;pointer-events:none;
  animation:ctStarTwinkle ease-in-out infinite;
  filter:drop-shadow(0 0 6px rgba(253,224,71,.7));
}
@keyframes ctStarTwinkle{
  0%,100%{opacity:.2;transform:translateY(0) scale(.8) rotate(0)}
  50%    {opacity:1;  transform:translateY(-12px) scale(1.3) rotate(180deg)}
}
.ct-text{padding:1.8rem 2rem 1.8rem;position:relative;z-index:2;color:#fff;text-align:center}
.ct-badge{
  display:inline-block;font-size:.72rem;font-weight:800;letter-spacing:.16em;
  padding:.4rem .9rem;border-radius:999px;
  background:linear-gradient(90deg,var(--amber),var(--yellow-300),var(--amber));
  background-size:200% 100%;color:var(--purple-900);
  animation:badgeShine 2s linear infinite;
  box-shadow:0 8px 20px -6px rgba(251,191,36,.5);
}
@keyframes badgeShine{to{background-position:200% 0%}}
.ct-name{margin:.9rem 0 .3rem;font-family:'Fraunces',serif;font-size:2.4rem;font-weight:800;line-height:1.05}
.ct-name-glow{
  background:linear-gradient(120deg,#fde047 0%,#b794f4 30%,#fff 50%,#fde047 70%,#b794f4 100%);
  background-size:200% 100%;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:nameShine 3.5s linear infinite;
  filter:drop-shadow(0 0 18px rgba(183,148,244,.55));
}
@keyframes nameShine{to{background-position:200% 0%}}
.ct-roll{font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:1rem}
.ct-quote{font-size:1rem;line-height:1.6;color:rgba(255,255,255,.92);max-width:440px;margin:0 auto 1.4rem}
.ct-quote strong{font-weight:700}
.ct-footer{display:flex;align-items:center;gap:1rem;justify-content:space-between;flex-wrap:wrap;margin-top:.5rem}
.ct-date-strip{text-align:left}
.ct-date-label{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--lav-300);font-weight:700}
.ct-date-value{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:700;color:#fff;margin-top:2px}
.ct-close{
  padding:.85rem 1.6rem;border:none;cursor:pointer;
  font-family:inherit;font-weight:700;font-size:.95rem;
  border-radius:999px;
  background:linear-gradient(135deg,var(--amber),var(--yellow-300));
  color:var(--purple-900);
  box-shadow:0 12px 28px -8px rgba(251,191,36,.6);
  transition:transform .2s ease;
}
.ct-close:hover{transform:scale(1.08) rotate(-2deg)}

/* ──────────────────────────────────────────────
   TYPE 2 · UPCOMING — TILTED VINYL / CASSETTE MAGIC
────────────────────────────────────────────── */
.card-upcoming-wrapper{
  position:relative;width:min(620px,94vw);
  animation:cuFlyIn .7s cubic-bezier(.2,1.2,.4,1) both;
  perspective:1400px;
}
@keyframes cuFlyIn{
  0%  {opacity:0;transform:rotate(-15deg) translateY(80px) scale(.85)}
  100%{opacity:1;transform:rotate(0) translateY(0) scale(1)}
}
.cu-corkboard{display:none}
.cu-tape,.cu-tape-corner{display:none}
.card-upcoming{
  position:relative;
  display:grid;grid-template-columns:1fr 1fr;gap:0;
  background:linear-gradient(135deg,#fffbea 0%,#f3e8ff 100%);
  border-radius:24px;overflow:hidden;
  box-shadow:0 40px 80px -20px rgba(76,29,149,.55),
             inset 0 1px 0 rgba(255,255,255,.8);
  border:2px solid rgba(124,58,237,.2);
}
.card-upcoming::before{
  /* big yellow halo behind */
  content:"";position:absolute;inset:-2px;border-radius:24px;padding:2px;
  background:linear-gradient(135deg,var(--amber),var(--lav-400),var(--amber));
  background-size:200% 200%;
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  animation:auroraSpin 4s linear infinite;pointer-events:none;
}
.cu-photo{
  position:relative;
  width:100%;aspect-ratio:1/1;
  border-radius:50%;
  overflow:hidden;
  margin:auto;
  max-width:280px;
  box-shadow:0 0 0 8px rgba(124,58,237,.15),0 0 0 18px rgba(253,224,71,.25),
             0 30px 60px -15px rgba(76,29,149,.5);
  align-self:center;
  justify-self:center;
  margin:2rem 0 2rem 2rem;
  animation:vinylSpin 22s linear infinite;
  position:relative;
}
.cu-photo::after{
  /* center dot like a record */
  content:"";position:absolute;top:50%;left:50%;width:38px;height:38px;
  border-radius:50%;
  background:radial-gradient(circle,var(--amber) 30%,var(--purple-800) 32%,var(--purple-800) 60%,var(--lav-600) 62%);
  transform:translate(-50%,-50%);
  box-shadow:0 0 0 4px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.4);
  z-index:3;
}
.cu-photo::before{
  /* grooves */
  content:"";position:absolute;inset:0;border-radius:50%;
  background:
    repeating-radial-gradient(circle at center,
      transparent 0,transparent 8px,
      rgba(0,0,0,.07) 8px,rgba(0,0,0,.07) 9px);
  z-index:2;pointer-events:none;
}
.cu-photo img{position:relative;z-index:1}
@keyframes vinylSpin{to{transform:rotate(360deg)}}
.cu-photo-placeholder{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:4rem;background:linear-gradient(135deg,var(--lav-300),var(--amber));z-index:1;
}
.cu-caption{padding:2rem 2rem 2rem 1rem;display:flex;flex-direction:column;justify-content:center;gap:.75rem;position:relative;z-index:2}
.cu-name{
  font-family:'Fraunces',serif;font-weight:800;font-size:1.9rem;line-height:1.1;
  color:var(--purple-900);
}
.cu-subtitle{font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--lav-600);font-weight:700}
.cu-countdown-box{
  display:flex;align-items:center;gap:1rem;margin:.6rem 0;
  padding:1rem 1.2rem;border-radius:18px;
  background:linear-gradient(135deg,var(--purple-800),var(--lav-600));
  color:#fff;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 12px 30px -10px rgba(76,29,149,.5);
  position:relative;overflow:hidden;
}
.cu-countdown-box::before{
  content:"";position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:conic-gradient(from 0deg,transparent 0,rgba(253,224,71,.25) 60deg,transparent 120deg);
  animation:auroraSpin 4s linear infinite;
}
.cu-cd-num{
  font-family:'Fraunces',serif;font-size:3.2rem;font-weight:900;line-height:.9;
  color:var(--amber);position:relative;
  text-shadow:0 0 24px rgba(251,191,36,.5);
}
.cu-cd-label{position:relative}
.cu-cd-label-top{font-size:.72rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;opacity:.85;display:block}
.cu-cd-date{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:700;margin-top:4px}
.cu-quote{font-size:.92rem;line-height:1.55;color:var(--ink-2);font-style:italic;border-left:3px solid var(--amber);padding-left:.8rem}
.cu-close{
  position:absolute;top:1rem;right:1rem;z-index:4;
  width:36px;height:36px;border:none;cursor:pointer;border-radius:50%;
  background:rgba(255,255,255,.85);color:var(--purple-800);font-weight:700;

}
.cu-close:hover{background:var(--amber);transform:rotate(90deg);transition:.3s}
@media (max-width:560px){
  .card-upcoming{grid-template-columns:1fr}

}

/* ──────────────────────────────────────────────
   TYPE 3 · OTHER — POLAROID DEVELOPING (lavender ink wash)
────────────────────────────────────────────── */
.card-other-wrapper{
  position:relative;width:min(380px,90vw);
  animation:coTilt .8s cubic-bezier(.2,1.2,.4,1) both;
}
@keyframes coTilt{
  0%  {opacity:0;transform:rotate(8deg) translateY(40px) scale(.8)}
  100%{opacity:1;transform:rotate(-2deg) translateY(0) scale(1)}
}
.card-other{
  position:relative;
  background:#fffdf5;
  padding:14px 14px 0;
  border-radius:6px;
  box-shadow:0 30px 60px -15px rgba(0,0,0,.5),
             0 0 0 1px rgba(124,58,237,.1);
  transform:rotate(-2deg);
}
.card-other::before{
  /* tape */
  content:"";position:absolute;top:-14px;left:50%;transform:translateX(-50%) rotate(-3deg);
  width:90px;height:28px;
  background:linear-gradient(135deg,rgba(253,224,71,.7),rgba(251,191,36,.85));
  box-shadow:0 4px 8px rgba(0,0,0,.15);
  border-radius:2px;
  z-index:5;
}
.co-photo{
  position:relative;width:100%;aspect-ratio:1/1;
  background:linear-gradient(135deg,var(--lav-100),#fff7c5);
  overflow:hidden;border-radius:3px;
}
.co-photo img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;
  transition:filter 1.4s ease,opacity 1.4s ease;
}
.co-photo img.undeveloped{filter:blur(20px) saturate(0) brightness(2);opacity:.3}
.co-photo img.developed{filter:none;opacity:1}
.co-dev-wash{
  position:absolute;inset:0;z-index:3;pointer-events:none;
  background:linear-gradient(135deg,rgba(183,148,244,.95),rgba(253,224,71,.95));
  transition:opacity 1.2s ease;
}
.co-dev-wash.gone{opacity:0}
.co-scan{
  position:absolute;left:0;right:0;top:-4px;height:60px;z-index:4;pointer-events:none;
  background:linear-gradient(to bottom,transparent,rgba(253,224,71,.9) 50%,transparent);
  filter:blur(2px);
  transition:top 1.4s cubic-bezier(.4,0,.2,1);
}
.co-photo-placeholder{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:3rem;
  background:linear-gradient(135deg,var(--lav-300),var(--amber));z-index:1;
}
.co-mini-confetti{position:absolute;bottom:90px;left:50%;width:0;height:0;pointer-events:none;z-index:6}
.co-confetti-p{
  position:absolute;width:8px;height:12px;left:0;top:0;
  animation:coConfetti var(--d) cubic-bezier(.2,.7,.3,1) var(--delay) forwards;
  opacity:0;
}
@keyframes coConfetti{
  0%  {opacity:1;transform:translate(0,0) rotate(0)}
  100%{opacity:0;transform:translate(var(--bx),var(--by)) rotate(var(--br))}
}
.co-white-bottom{padding:1.1rem .5rem 1.4rem;text-align:center;font-family:'Caveat',cursive}
.co-name{font-size:2.2rem;font-weight:700;color:var(--purple-800);line-height:1}
.co-bday-info{font-family:'Space Grotesk',sans-serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--lav-600);font-weight:700;margin:.5rem 0 .7rem}
.co-quote{font-family:'Space Grotesk',sans-serif;font-size:.9rem;color:var(--ink-2);font-style:italic;line-height:1.5;padding:0 .5rem}
.co-close{
  position:absolute;top:-14px;right:-14px;
  width:36px;height:36px;border:none;cursor:pointer;border-radius:50%;
  background:var(--purple-800);color:#fff;font-weight:700;font-size:.8rem;
  box-shadow:0 6px 14px rgba(0,0,0,.3);z-index:6;
}
.co-close:hover{background:var(--amber);color:var(--purple-900);transform:scale(1.1) rotate(90deg);transition:.3s}

/* ── Nav float ── */
.card-nav-float{
  position:absolute;bottom:-60px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:.6rem;
  background:rgba(255,255,255,.95);backdrop-filter:blur(8px);

.dark-nav{background:rgba(46,16,101,.85);color:#fff}
.cnf-btn{

/* ── Confetti canvas ── */
#confettiCanvas{position:fixed;inset:0;pointer-events:none;z-index:300;display:none}
</style>

<script src="shared.js"></script>
<script src="nepali-date.js"></script>
<script>
/* ─── Birthdays page logic (unchanged behavior) ─── */
const BS_MONTHS = NepaliDate.BS_MONTHS_EN;
function toTitle(s){ return s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase()); }
function getInitials(n){ return n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2); }

function buildBirthdayData(){
  const out = [];
  Object.keys(STUDENT_PROFILES).forEach(rollStr => {
    const roll = Number(rollStr);
    const p = STUDENT_PROFILES[roll];
    if(!p || !p.dob || !p.dob.bsDay) return;
    const s = STUDENTS.find(x => x.roll === roll);
    if(!s) return;
    out.push({ roll, name: s.name, bsYear: p.dob.bsYear, bsMonth: p.dob.bsMonth, bsDay: p.dob.bsDay });
  });
  const cached = JSON.parse(localStorage.getItem('ec_birthdays') || '[]');
  const profileRolls = new Set(out.map(x=>x.roll));
  cached.forEach(b => { if(!profileRolls.has(b.roll)) out.push(b); });
  localStorage.setItem('ec_birthdays', JSON.stringify(out));
  return out;
}

let _memberPhotos = {};
function photoUrl(roll){ return getDriveFolderPhotoUrl(roll, _memberPhotos); }

function daysUntil(bsMonth, bsDay){
  const today = NepaliDate.todayBS();
  const todayAd = new Date(); todayAd.setHours(0,0,0,0);
  let d = NepaliDate.bsToAd(today.y, bsMonth, bsDay);
  d.setHours(0,0,0,0);
  let diff = Math.round((d - todayAd) / 86400000);
  if(diff <= 0){
    d = NepaliDate.bsToAd(today.y + 1, bsMonth, bsDay);
    d.setHours(0,0,0,0);
    diff = Math.round((d - todayAd) / 86400000);
  }
  return diff;
}

(function initFloaters(){
  const wrap = document.getElementById('heroFloaters');
  const emojis = ['🎂','🎁','🎈','🥳','✨','🎉','🌟','🎊','💜','🌟'];
  for(let i=0;i<16;i++){
    const el = document.createElement('span');
    el.className = 'floater';
    el.textContent = emojis[i % emojis.length];
    el.style.cssText = `left:${Math.random()*100}%;bottom:-30px;font-size:${1.2+Math.random()*1.4}rem;animation-duration:${6+Math.random()*8}s;animation-delay:${Math.random()*8}s;`;
    wrap.appendChild(el);
  }
})();

document.querySelectorAll('.reveal').forEach(el => {
  new IntersectionObserver((entries) => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 }).observe(el);
});

function renderUpcoming(data){
  const el = document.getElementById('upcomingList');
  const list = data
    .map(b => ({...b, days: daysUntil(b.bsMonth, b.bsDay)}))
    .filter(b => b.days > 0 && b.days <= 30)
    .sort((a,b) => a.days - b.days)
    .slice(0, 10);
  if(!list.length){ el.innerHTML='<div class="upcoming-empty">No birthdays in the next 30 days 🎈</div>'; return; }
  document.getElementById('upcomingBadge').textContent = `${list.length} coming up`;
  el.innerHTML = list.map(b => `
    <div class="upcoming-item${b.days<=7?' is-soon':''}" onclick="openPopup(${b.roll})">
      <div class="days-pill">
        <div class="days-num">${b.days}</div>
        <div class="days-lbl">day${b.days!==1?'s':''}</div>
      </div>
      <div>
        <div class="ui-name">${toTitle(b.name)}</div>
        <div class="ui-date">${BS_MONTHS[b.bsMonth-1]} ${b.bsDay} BS</div>
      </div>
    </div>`).join('');
}

function renderAll(data){
  const el = document.getElementById('allBirthdays');
  if(!data.length){ el.innerHTML='<p style="color:var(--ink-3);font-style:italic">No birthday data yet.</p>'; return; }
  const today = NepaliDate.todayBS();
  const byMonth = {};
  data.forEach(b => { (byMonth[b.bsMonth] = byMonth[b.bsMonth] || []).push(b); });
  el.innerHTML = Object.keys(byMonth).sort((a,b)=>Number(a)-Number(b)).map(m => {
    const group = byMonth[m].sort((a,b)=>a.bsDay-b.bsDay);
    return `
      <div class="month-section">
        <div class="month-header">
          <span class="month-name">${BS_MONTHS[m-1]}</span>
          <div class="month-line"></div>
          <span class="month-count">${group.length} birthday${group.length!==1?'s':''}</span>
        </div>
        <div class="month-chips">
          ${group.map(b => {
            const isToday = today.m == b.bsMonth && today.d == b.bsDay;
            return `<div class="bday-chip${isToday?' today-chip':''}" onclick="openPopup(${b.roll})">
              <span class="chip-day">${b.bsDay}</span>
              <span class="chip-name">${toTitle(b.name)}</span>
              ${isToday ? '<span class="chip-today-dot"></span>' : ''}
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }).join('');
}

function renderTodayBanner(data){
  const today = NepaliDate.todayBS();
  const celebs = data.filter(b => today.m == b.bsMonth && today.d == b.bsDay);
  if(!celebs.length) return;
  const banner = document.getElementById('todayBanner');
  banner.style.display = 'flex';
  const names = celebs.map(b=>toTitle(b.name)).join(' & ');
  document.getElementById('todayBannerText').innerHTML =
    `<strong>🎉 Happy Birthday!</strong> Today we celebrate <strong>${names}</strong> from Section E. Open their card below!`;
}

const MESSAGES = [
  "May this year bring incredible <strong style='color:#7c3aed'>discoveries</strong>, lifelong <strong style='color:#eab308'>friendships</strong>, and all the <strong style='color:#b794f4'>happiness</strong> you deserve. Section E is lucky to have you! 🌟",
  "Another year <strong style='color:#7c3aed'>wiser</strong>, another year <strong style='color:#eab308'>brighter</strong>! Wishing you a day as wonderful as the <strong style='color:#b794f4'>energy</strong> you bring every day. 🎓",
  "Here's to <strong style='color:#eab308'>you</strong> — the person who makes Section E a little more <strong style='color:#7c3aed'>special</strong>. May your birthday start your most <strong style='color:#b794f4'>amazing chapter</strong> yet! 📖",
  "From all of <strong style='color:#7c3aed'>Section E</strong> — we hope today is filled with everything that makes you <strong style='color:#eab308'>smile</strong>. Happy Birthday, you absolute <strong style='color:#b794f4'>legend</strong>! 🏆",
  "Science says you're made of <strong style='color:#b794f4'>stardust</strong>. Today we celebrate the <strong style='color:#eab308'>star</strong> that you are. Have an <strong style='color:#7c3aed'>out-of-this-world</strong> birthday! ⭐",
];

let _popupList = [], _popupIdx = 0, _currentType = 'other';

function getCardType(b){
  const today = NepaliDate.todayBS();
  if(today.m === b.bsMonth && today.d === b.bsDay) return 'today';
  const days = daysUntil(b.bsMonth, b.bsDay);
  if(days > 0 && days <= 30) return 'upcoming';
  return 'other';
}

function buildTodayCard(b){
  const title = toTitle(b.name);
  const url = photoUrl(b.roll);
  const frame = document.getElementById('ctPhotoFrame');
  frame.querySelectorAll('.ct-photo-img,.ct-photo-placeholder,.ct-star').forEach(el=>el.remove());

  const img = document.createElement('img');
  img.className = 'ct-photo-img';
  img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;display:block;filter:brightness(.88) saturate(1.15);';
  img.src = url;
  img.alt = title;
  img.onerror = function(){
    this.remove();
    const ph = document.createElement('div');
    ph.className = 'ct-photo-placeholder';
    ph.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2e1065,#b794f4);font-size:6rem;';
    ph.textContent = '🎂';
    frame.insertBefore(ph, frame.querySelector('.ct-aurora'));
  };
  frame.insertBefore(img, frame.querySelector('.ct-aurora'));

  const emojis = ['✨','⭐','🌟','💫','🎉','🎊','💜','🟡'];
  for(let i=0;i<12;i++){
    const s = document.createElement('span');
    s.className = 'ct-star';
    s.textContent = emojis[i%emojis.length];
    s.style.cssText = `
      left:${10+Math.random()*80}%;
      bottom:${10+Math.random()*60}%;
      font-size:${.7+Math.random()*1}rem;
      animation-duration:${2.5+Math.random()*3}s;
      animation-delay:${Math.random()*3}s;
    `;
    frame.appendChild(s);
  }

  document.getElementById('ctName').textContent = title;
  document.getElementById('ctRoll').textContent = `Roll No. ${b.roll} · Section E`;
  const p = STUDENT_PROFILES[b.roll];
  const msg = (p && p.quote) ? p.quote : MESSAGES[Math.floor(Math.random()*MESSAGES.length)];
  document.getElementById('ctQuote').innerHTML = msg;
  document.getElementById('ctDate').textContent = `${BS_MONTHS[b.bsMonth-1]} ${b.bsDay}, ${b.bsYear||2064} BS`;
}

const TAPE_STYLES = ['cu-tape-orange','cu-tape-blue','cu-tape-pink'];
function buildUpcomingCard(b){
  const title = toTitle(b.name);
  const url = photoUrl(b.roll);
  const days = daysUntil(b.bsMonth, b.bsDay);
  const tape = document.getElementById('cuTapeStyle');
  tape.className = `cu-tape ${TAPE_STYLES[b.roll % TAPE_STYLES.length]}`;

  const photoEl = document.getElementById('cuPhoto');
  photoEl.innerHTML = '';
  const img = document.createElement('img');
  img.src = url; img.alt = title;
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;object-position:top center;display:block;';
  img.onerror = function(){
    this.remove();
    const ph = document.createElement('div');
    ph.className = 'cu-photo-placeholder';
    ph.textContent = '📸';
    photoEl.appendChild(ph);
  };
  photoEl.appendChild(img);

  document.getElementById('cuName').textContent = title;
  document.getElementById('cuSubtitle').textContent = `Roll No. ${b.roll} · Section E`;
  document.getElementById('cuDaysNum').textContent = days;
  document.getElementById('cuBdayDate').textContent = `${BS_MONTHS[b.bsMonth-1]} ${b.bsDay} BS`;
  const p = STUDENT_PROFILES[b.roll];
  const quote = (p && p.quote) ? p.quote : `Looking forward to celebrating ${title}'s special day! 🎊`;
  document.getElementById('cuQuote').innerHTML = quote;
}

function buildOtherCard(b){
  const title = toTitle(b.name);
  const url = photoUrl(b.roll);
  const photoEl = document.getElementById('coPhoto');
  photoEl.querySelectorAll('img,.co-photo-placeholder').forEach(el=>el.remove());

  const img = document.createElement('img');
  img.src = url; img.alt = title;
  img.className = 'undeveloped';
  img.onerror = function(){
    this.remove();
    const ph = document.createElement('div');
    ph.className = 'co-photo-placeholder';
    ph.textContent = '📸';
    photoEl.insertBefore(ph, document.getElementById('coWash'));
  };
  photoEl.insertBefore(img, document.getElementById('coWash'));

  document.getElementById('coName').textContent = title;
  document.getElementById('coBdayInfo').textContent = `${BS_MONTHS[b.bsMonth-1]} ${b.bsDay}, ${b.bsYear||2064} BS · Roll ${b.roll}`;
  const p = STUDENT_PROFILES[b.roll];
  const quote = (p && p.quote) ? p.quote
    : `${title} celebrates their birthday on ${BS_MONTHS[b.bsMonth-1]} ${b.bsDay}. Can't wait to celebrate! 🎊`;
  document.getElementById('coQuote').innerHTML = quote;

  const wash = document.getElementById('coWash');
  const scan = document.getElementById('coScan');
  wash.classList.remove('gone');
  scan.classList.remove('done');
  scan.style.top = '-4px';

  setTimeout(() => {
    scan.style.top = '105%';
    wash.classList.add('gone');
    img.classList.remove('undeveloped');
    img.classList.add('developed');
    fireBottomConfetti();
  }, 500);
}

function fireBottomConfetti(){
  const box = document.getElementById('coConfettiBox');
  box.innerHTML = '';
  const colors = ['#b794f4','#7c3aed','#fde047','#eab308','#c9aaff','#fbbf24'];
  for(let i=0;i<26;i++){
    const p = document.createElement('div');
    p.className = 'co-confetti-p';
    const angle = (Math.random() * 180) - 90;
    const dist = 60 + Math.random() * 110;
    const bx = Math.sin(angle * Math.PI/180) * dist + 'px';
    const by = -(Math.cos(angle * Math.PI/180) * dist * .6 + 20 + Math.random()*60) + 'px';
    p.style.cssText = `
      background:${colors[i%colors.length]};
      --bx:${bx}; --by:${by};
      --br:${Math.random()*720-360}deg;
      --d:${.6+Math.random()*.8}s;
      --delay:${Math.random()*.4}s;
      border-radius:${Math.random()>.5?'50%':'2px'};
    `;
    box.appendChild(p);
  }
}

function openPopup(roll){
  const data = JSON.parse(localStorage.getItem('ec_birthdays')||'[]');
  const b = data.find(x => x.roll === roll);
  if(!b) return;
  const type = getCardType(b);
  _currentType = type;
  const sameDay = data.filter(x => x.bsMonth === b.bsMonth && x.bsDay === b.bsDay);
  _popupList = sameDay.length > 1 ? sameDay : [b];
  _popupIdx = _popupList.findIndex(x => x.roll === roll);
  if(_popupIdx < 0) _popupIdx = 0;

  const overlay = document.getElementById('bdayOverlay');
  overlay.className = `bday-overlay type-${type}`;
  document.getElementById('cardTodayWrapper').style.display = 'none';
  document.getElementById('cardUpcomingWrapper').style.display = 'none';
  document.getElementById('cardOtherWrapper').style.display = 'none';
  document.getElementById('ctNav').classList.add('hidden');

  if(type === 'today'){
    document.getElementById('cardTodayWrapper').style.display = '';
    buildTodayCard(b);
    setupNav('ctNav','ctNavCount','ctPrev','ctNext');
    setTimeout(launchConfetti, 350);
  } else if(type === 'upcoming'){
    document.getElementById('cardUpcomingWrapper').style.display = '';
    buildUpcomingCard(b);
    setupNav('cuNav','cuNavCount','cuPrev','cuNext');
  } else {
    document.getElementById('cardOtherWrapper').style.display = '';
    buildOtherCard(b);
    setupNav('coNav','coNavCount','coPrev','coNext');
  }
  overlay.classList.add('open');
}

function setupNav(navId, countId){
  const nav = document.getElementById(navId);
  if(_popupList.length > 1){
    nav.classList.remove('hidden');
    document.getElementById(countId).textContent = `${_popupIdx+1} / ${_popupList.length}`;
  } else nav.classList.add('hidden');
}

function closePopup(){ document.getElementById('bdayOverlay').classList.remove('open'); }

function wireNav(prevId, nextId, countId, buildFn){
  document.getElementById(prevId).onclick = () => {
    _popupIdx = (_popupIdx - 1 + _popupList.length) % _popupList.length;
    buildFn(_popupList[_popupIdx]);
    document.getElementById(countId).textContent = `${_popupIdx+1} / ${_popupList.length}`;
  };
  document.getElementById(nextId).onclick = () => {
    _popupIdx = (_popupIdx + 1) % _popupList.length;
    buildFn(_popupList[_popupIdx]);
    document.getElementById(countId).textContent = `${_popupIdx+1} / ${_popupList.length}`;
  };
}
wireNav('ctPrev','ctNext','ctNavCount', buildTodayCard);
wireNav('cuPrev','cuNext','cuNavCount', buildUpcomingCard);
wireNav('coPrev','coNext','coNavCount', buildOtherCard);

document.getElementById('ctClose').onclick = closePopup;
document.getElementById('cuClose').onclick = closePopup;
document.getElementById('coClose').onclick = closePopup;
document.getElementById('bdayOverlay').addEventListener('click', e => {
  if(e.target === e.currentTarget) closePopup();
});

function launchConfetti(){
  const canvas = document.getElementById('confettiCanvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  const colors = ['#b794f4','#7c3aed','#fde047','#eab308','#c9aaff','#fbbf24','#a78bfa','#fff'];
  const shapes = ['rect','circle','star'];
  const pieces = Array.from({length:220}, () => ({
    x: Math.random()*canvas.width, y: -20,
    w: Math.random()*13+5, h: Math.random()*8+4,
    color: colors[Math.floor(Math.random()*colors.length)],
    shape: shapes[Math.floor(Math.random()*shapes.length)],
    rot: Math.random()*Math.PI*2, rs: (Math.random()-.5)*.18,
    vx: (Math.random()-.5)*4, vy: Math.random()*5+2, alpha:1,
  }));
  let frame = 0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if(p.shape === 'circle'){ ctx.beginPath(); ctx.arc(0,0,p.w/2,0,Math.PI*2); ctx.fill(); }
      else if(p.shape === 'star'){ ctx.font = `${p.w}px serif`; ctx.fillText('★',0,0); }
      else { ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); }
      ctx.restore();
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rs; p.vy+=.08;
      if(frame > 90) p.alpha -= 0.012;
    });
    frame++;
    if(frame < 240) requestAnimationFrame(draw);
    else { ctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display='none'; }
  }
  draw();
}

let _siteData = {};
(async function init(){
  _siteData = await loadSiteData();
  _memberPhotos = _siteData.memberPhotos || {};
  const data = buildBirthdayData();
  renderTodayBanner(data);
  renderUpcoming(data);
  renderAll(data);
})();
