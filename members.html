<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Members — The E Chronicles</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
*,*::before,*::after{box-sizing:border-box}

:root{
  --bg:#0a0a0f;
  --bg2:#111118;
  --surface:#16161f;
  --surface2:#1e1e2a;
  --border:rgba(255,255,255,.07);
  --border-hover:rgba(255,255,255,.15);
  --text:#f0f0f5;
  --text2:#a8a8b8;
  --text3:#5c5c78;
  --accent:#8b5cf6;
  --accent2:#6d28d9;
  --accent-light:rgba(139,92,246,.12);
  --gold:#f59e0b;
  --gold-light:rgba(245,158,11,.12);
  --gold-glow:rgba(245,158,11,.25);
  --shadow-lg:0 24px 60px rgba(0,0,0,.6),0 8px 20px rgba(0,0,0,.4);
  --mesh:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(139,92,246,.15),transparent);
}

.page-hero{background:var(--surface);border-bottom:1px solid var(--border);padding:4rem 2.5rem 3.5rem;position:relative;overflow:hidden}
.page-hero::before{content:'';position:absolute;inset:0;background:var(--mesh);pointer-events:none}
.page-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(139,92,246,.4),rgba(245,158,11,.3),transparent)}
.page-hero-inner{max-width:1200px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1.5rem;position:relative;z-index:1}

.members-section{padding:3rem 2.5rem 6rem}
.members-inner{max-width:1200px;margin:0 auto}
.members-toolbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:2.5rem}
.member-count-badge{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--text3);letter-spacing:.12em;padding:.4rem .85rem;background:var(--surface);border:1px solid var(--border);border-radius:8px}

.search-wrap{display:flex;align-items:center;gap:.65rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.6rem 1rem;transition:border-color .2s,box-shadow .2s;flex:1;max-width:360px}
.search-wrap:focus-within{border-color:rgba(139,92,246,.5);box-shadow:0 0 0 3px rgba(139,92,246,.1)}
.search-wrap svg{flex-shrink:0;color:var(--text3)}
.search-input{background:none;border:none;outline:none;font-family:'DM Mono',monospace;font-size:.78rem;color:var(--text);width:100%}
.search-input::placeholder{color:var(--text3)}

/* ── CARD GRID ── */
.members-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:1.25rem}

.member-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;transition:transform .32s cubic-bezier(.34,1.56,.64,1),box-shadow .32s,border-color .25s;position:relative}
.member-card::before{content:'';position:absolute;inset:0;border-radius:20px;background:linear-gradient(135deg,rgba(139,92,246,.06) 0%,transparent 60%);opacity:0;transition:opacity .3s;pointer-events:none;z-index:0}
.member-card:hover{transform:translateY(-10px) scale(1.02);box-shadow:var(--shadow-lg),0 0 0 1px rgba(139,92,246,.2);border-color:rgba(139,92,246,.3)}
.member-card:hover::before{opacity:1}

.mc-photo{width:100%;aspect-ratio:3/4;background:var(--bg2);overflow:hidden;position:relative}
.mc-photo img{width:100%;height:100%;object-fit:cover;object-position:top center;transition:transform .5s ease;display:block}
.member-card:hover .mc-photo img{transform:scale(1.1)}
.mc-photo-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;background:linear-gradient(135deg,#1a1030 0%,#0d0d1a 100%)}
.mc-initials{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}

.mc-photo::before{content:'';position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(to top,rgba(6,5,15,.8) 0%,transparent 100%);z-index:1;pointer-events:none}

.mc-quote-overlay{position:absolute;inset:0;z-index:3;background:linear-gradient(160deg,rgba(109,40,217,.92) 0%,rgba(139,92,246,.88) 50%,rgba(245,158,11,.2) 100%);display:flex;align-items:center;justify-content:center;padding:1.25rem;opacity:0;transition:opacity .35s ease}
.member-card:hover .mc-quote-overlay{opacity:1}
.mc-quote-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.88rem;color:#fff;text-align:center;line-height:1.6}

.mc-badge{position:absolute;top:.65rem;right:.65rem;z-index:2;font-size:.6rem;font-weight:600;letter-spacing:.08em;padding:.22rem .55rem;border-radius:7px;font-family:'DM Mono',monospace}

/* ── CR badge — animated gold shimmer ── */
@keyframes goldShimmer{
  0%{background-position:200% center}
  100%{background-position:-200% center}
}
.mc-badge-cr{
  color:#fff;
  border:1px solid rgba(251,191,36,.45);
  background:linear-gradient(270deg,#78350f,#d97706,#fbbf24,#d97706,#92400e);
  background-size:300% 100%;
  animation:goldShimmer 4s linear infinite;
  box-shadow:0 2px 16px rgba(217,119,6,.6),0 1px 3px rgba(0,0,0,.5),inset 0 1px 0 rgba(251,191,36,.25);
}
.mc-badge-cr::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(110deg,rgba(255,255,255,.18) 0%,transparent 45%);
  pointer-events:none;border-radius:inherit;
}

/* ── CCR badge — premium crown gold, larger + pulsing glow ── */
@keyframes ccrPulse{
  0%,100%{box-shadow:0 2px 20px rgba(245,158,11,.7),0 0 40px rgba(245,158,11,.3),0 1px 3px rgba(0,0,0,.6)}
  50%{box-shadow:0 2px 28px rgba(245,158,11,1),0 0 60px rgba(245,158,11,.5),0 1px 3px rgba(0,0,0,.6)}
}
@keyframes ccrShimmer{
  0%{background-position:200% center}
  100%{background-position:-200% center}
}
.mc-badge-ccr{
  color:#1a0800;
  font-weight:700;
  font-size:.62rem;
  letter-spacing:.1em;
  border:1px solid rgba(253,224,71,.7);
  background:linear-gradient(270deg,#92400e,#d97706,#fde047,#f59e0b,#fbbf24,#d97706,#92400e);
  background-size:300% 100%;
  animation:ccrShimmer 2.5s linear infinite,ccrPulse 2.5s ease-in-out infinite;
  padding:.28rem .65rem;
  border-radius:8px;
}
.mc-badge-ccr::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(110deg,rgba(255,255,255,.35) 0%,transparent 45%);
  pointer-events:none;border-radius:inherit;
}

/* ── MGMT badge — deep violet ── */
.mc-badge-mgmt{
  color:#fff;
  border:1px solid rgba(167,139,250,.3);
  background:linear-gradient(135deg,#3730a3 0%,#4f46e5 45%,#7c3aed 80%,#8b5cf6 100%);
  box-shadow:0 2px 12px rgba(124,58,237,.5),0 1px 3px rgba(0,0,0,.4),inset 0 1px 0 rgba(167,139,250,.2);
}
.mc-badge-mgmt::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(110deg,rgba(255,255,255,.15) 0%,transparent 50%);
  pointer-events:none;border-radius:inherit;
}

.mc-profile-dot{position:absolute;bottom:.65rem;left:.65rem;z-index:2;width:8px;height:8px;border-radius:50%;border:2px solid rgba(255,255,255,.5)}
.mc-profile-dot.has-profile{background:#10b981;box-shadow:0 0 6px rgba(16,185,129,.6)}
.mc-profile-dot.no-profile{background:#374151}

/* CR card gold border */
.cr-card{border-color:rgba(217,119,6,.3)!important}
.cr-card:hover{border-color:rgba(245,158,11,.6)!important;box-shadow:var(--shadow-lg),0 0 30px rgba(245,158,11,.15)!important}
.cr-card .mc-photo::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(217,119,6,.12) 0%,transparent 55%);pointer-events:none;z-index:0}

/* CCR card — stronger, brighter gold aura */
.ccr-card{border-color:rgba(245,158,11,.55)!important;background:linear-gradient(160deg,rgba(245,158,11,.06) 0%,var(--surface) 40%)!important}
.ccr-card:hover{border-color:#f59e0b!important;box-shadow:var(--shadow-lg),0 0 50px rgba(245,158,11,.3),0 0 0 1px rgba(245,158,11,.4)!important}
.ccr-card .mc-photo::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(245,158,11,.2) 0%,transparent 55%);pointer-events:none;z-index:0}

.mc-info{padding:1rem 1rem 1.1rem;position:relative;z-index:1}
.mc-roll{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--text3);letter-spacing:.15em;margin-bottom:.28rem;text-transform:uppercase}
.mc-name{font-size:.83rem;font-weight:600;line-height:1.3;color:var(--text)}
.mc-meta{display:flex;align-items:center;gap:.35rem;margin-top:.45rem;flex-wrap:wrap}
.mc-tag{display:inline-flex;align-items:center;gap:.2rem;font-family:'DM Mono',monospace;font-size:.53rem;letter-spacing:.06em;text-transform:uppercase;padding:.12rem .44rem;border-radius:5px;white-space:nowrap}
.mc-tag-cr{background:var(--gold-light);color:var(--gold);border:1px solid rgba(245,158,11,.2)}
/* CCR tag — solid gold fill so it pops */
.mc-tag-ccr{background:linear-gradient(135deg,rgba(245,158,11,.25),rgba(253,224,71,.15));color:#fde047;border:1px solid rgba(253,224,71,.4);font-weight:700}
.mc-tag-mgmt{background:var(--accent-light);color:var(--accent);border:1px solid rgba(139,92,246,.2)}
.mc-dob{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--text3);margin-top:.35rem;display:flex;align-items:center;gap:.3rem}

/* ── MODAL ── */
.modal{position:relative;max-width:420px;width:100%;display:flex;flex-direction:column;max-height:90vh;overflow:hidden;border-radius:24px;box-shadow:0 40px 100px rgba(0,0,0,.7),0 0 0 1px rgba(139,92,246,.15)}
.modal-top-bar{height:3px;width:100%;background:linear-gradient(90deg,var(--accent),var(--gold),var(--accent));background-size:200% 100%;animation:shimmer 3s linear infinite;flex-shrink:0}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.modal-inner{overflow-y:auto;padding:1.5rem 1.5rem 2rem}
.modal-inner::-webkit-scrollbar{width:4px}
.modal-inner::-webkit-scrollbar-track{background:transparent}
.modal-inner::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:4px}

.modal-header{display:flex;gap:1.25rem;align-items:flex-start;margin-bottom:1.25rem}
.modal-photo-sm{width:88px;height:112px;flex-shrink:0;border-radius:14px;overflow:hidden;background:var(--bg2)}
.modal-photo-sm img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.modal-photo-sm-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cr-modal-photo{border:2px solid var(--gold);box-shadow:0 0 20px var(--gold-glow),0 4px 20px rgba(0,0,0,.4)}
/* CCR modal photo — thicker border + stronger glow */
.ccr-modal-photo{border:2px solid #fde047;box-shadow:0 0 30px rgba(253,224,71,.5),0 0 60px rgba(245,158,11,.25),0 4px 20px rgba(0,0,0,.5)!important}

.modal-header-info{flex:1;min-width:0}
.modal-roll{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--text3);letter-spacing:.14em;margin-bottom:.35rem}
.modal-name{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;margin-bottom:.55rem;line-height:1.15;color:var(--text)}
.modal-tags{display:flex;gap:.4rem;flex-wrap:wrap}
.modal-divider{border:none;border-top:1px solid var(--border);margin:.95rem 0}

.modal-quote-block{background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(109,40,217,.06));border-left:2px solid var(--accent);border-radius:0 12px 12px 0;padding:.9rem 1.1rem;margin-bottom:1.1rem}
/* CCR quote block — gold left border */
.modal-quote-block.ccr-quote{background:linear-gradient(135deg,rgba(245,158,11,.1),rgba(253,224,71,.04));border-left-color:#f59e0b}
.modal-quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:var(--text2);line-height:1.7}
.modal-quote::before{content:'\201C';color:var(--accent);font-size:1.5rem;line-height:0;vertical-align:-.4rem;margin-right:.1rem}
.modal-quote::after{content:'\201D';color:var(--accent);font-size:1.5rem;line-height:0;vertical-align:-.4rem;margin-left:.1rem}
.ccr-quote .modal-quote::before,.ccr-quote .modal-quote::after{color:#f59e0b}

.modal-exp-label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);margin-bottom:.45rem}
.modal-exp{font-size:.86rem;color:var(--text2);line-height:1.7;font-style:italic;padding:.9rem 1.1rem;background:var(--surface2);border-radius:12px;border:1px solid var(--border)}

.modal-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-top:.95rem}
.modal-info-item{background:var(--bg2);border-radius:12px;padding:.7rem .9rem;border:1px solid var(--border)}
.modal-info-label{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:.25rem}
.modal-info-val{font-size:.82rem;font-weight:600;color:var(--text)}

.no-results{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--text3);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.15rem}

/* ── MOBILE ── */
@media(max-width:768px){
  .members-section{padding:2rem 1.25rem 4rem}
  .page-hero{padding:2.75rem 1.25rem 2.25rem}
  .members-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:.9rem}
  .modal{border-radius:18px}
}
@media(max-width:400px){
  .members-grid{grid-template-columns:repeat(2,1fr);gap:.7rem}
}
</style>
</head>
<body>
<div class="page">
  <div class="page-hero">
    <div class="page-hero-inner reveal">
      <div>
        <div class="section-label">// The people</div>
        <h1 class="section-title" style="margin-bottom:0">Members</h1>
        <p class="section-desc" style="margin-top:.5rem">All 56 students of Section E — St. Xavier's College, Science Biology, Batch 2025–2027.</p>
      </div>
    </div>
  </div>

  <section class="members-section">
    <div class="members-inner">
      <div class="members-toolbar reveal">
        <div class="search-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Search by name or roll number…"/>
        </div>
        <div class="member-count-badge" id="countLabel">56 students</div>
      </div>
      <div class="members-grid reveal reveal-delay-1" id="membersGrid"></div>
    </div>
  </section>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="memberModal"><div class="modal-top-bar"></div>
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-inner" id="modalContent"></div>
  </div>
</div>

<script src="shared.js"></script>
<script>
injectNav();

function toTitle(str){return str.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase())}
function getInitials(name){return name.split(' ').slice(0,2).map(w=>w[0]).join('')}

function renderGrid(filter=''){
  const grid=document.getElementById('membersGrid');
  const f=filter.toLowerCase().trim();
  const filtered=STUDENTS.filter(s=>!f||s.name.toLowerCase().includes(f)||String(s.roll).includes(f));
  document.getElementById('countLabel').textContent=`${filtered.length} student${filtered.length!==1?'s':''}`;
  if(!filtered.length){grid.innerHTML='<div class="no-results">No students found matching your search.</div>';return;}

  grid.innerHTML=filtered.map(s=>{
    const initials=getInitials(s.name);
    const title=toTitle(s.name);
    // CCR gets its own card class; regular CR gets cr-card
    const cardClass=s.ccr?'cr-card ccr-card':s.cr?'cr-card':'';
    const p=STUDENT_PROFILES[s.roll];
    const hasProfile=!!p;
    const wantsMgmt=p&&p.wantsManagement;
    const quote=p&&p.quote?p.quote:'';
    const photoSrc=getDriveFolderPhotoUrl(s.roll, _memberPhotos);

    // Badge: CCR > CR > MGMT
    let badge='';
    if(s.ccr)       badge=`<div class="mc-badge mc-badge-ccr">👑 CCR</div>`;
    else if(s.cr)   badge=`<div class="mc-badge mc-badge-cr">★ CR</div>`;
    else if(wantsMgmt) badge=`<div class="mc-badge mc-badge-mgmt">⚡ MGMT</div>`;

    // Tag below name: CCR > CR > MGMT
    let tag='';
    if(s.ccr)            tag=`<span class="mc-tag mc-tag-ccr">👑 ${s.crTitle||'Chief CR'}</span>`;
    else if(s.cr)        tag=`<span class="mc-tag mc-tag-cr">★ ${s.crTitle||'Class Rep'}</span>`;
    else if(wantsMgmt)   tag='<span class="mc-tag mc-tag-mgmt">⚡ Mgmt</span>';

    return `
    <div class="member-card ${cardClass}" onclick="openModal(${s.roll})">
      <div class="mc-photo">
        <img src="${photoSrc}" alt="${title}"
          onerror="this.parentElement.innerHTML='<div class=mc-photo-placeholder><div class=mc-initials>${initials}</div></div>'"
          loading="lazy"/>
        ${badge}
        <div class="mc-profile-dot ${hasProfile?'has-profile':'no-profile'}"></div>
        ${quote?`<div class="mc-quote-overlay"><div class="mc-quote-text">${quote.length>80?quote.substring(0,80)+'…':quote}</div></div>`:''}
      </div>
      <div class="mc-info">
        <div class="mc-roll">#${s.roll}</div>
        <div class="mc-name">${title}</div>
        <div class="mc-meta">${tag}</div>
        ${(p&&p.dob&&p.dob.bsDay)?`<div class="mc-dob">🎂 ${p.dob.monthName} ${p.dob.bsDay}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

const BS_MONTHS=['Baishakh','Jestha','Ashadh','Shrawan','Bhadra','Ashwin','Kartik','Mangsir','Poush','Magh','Falgun','Chaitra'];

function openModal(roll){
  const s=STUDENTS.find(s=>s.roll===roll);
  if(!s) return;
  const title=toTitle(s.name);
  const initials=getInitials(s.name);
  const p=STUDENT_PROFILES[s.roll];
  const photoSrc=getDriveFolderPhotoUrl(roll, _memberPhotos);

  // CCR gets the premium photo style; regular CR gets standard gold
  const photoClass=s.ccr?'ccr-modal-photo':s.cr?'cr-modal-photo':'';

  let dobStr='—';
  if(p&&p.dob){
    const d=p.dob;
    dobStr=d.bsDay?`${d.monthName} ${d.bsDay}, ${d.bsYear} BS`:`${d.monthName} ${d.bsYear} BS`;
  }

  // Modal tag
  let modalTag='';
  if(s.ccr)          modalTag=`<span class="mc-tag mc-tag-ccr">👑 ${s.crTitle}</span>`;
  else if(s.cr)      modalTag=`<span class="mc-tag mc-tag-cr">★ ${s.crTitle}</span>`;
  if(p&&p.wantsManagement) modalTag+=`<span class="mc-tag mc-tag-mgmt">⚡ Management Team</span>`;

  document.getElementById('modalContent').innerHTML=`
    <div class="modal-header">
      <div class="modal-photo-sm ${photoClass}">
        <img src="${photoSrc}" alt="${title}"
          onerror="this.parentElement.innerHTML='<div class=modal-photo-sm-placeholder>${initials}</div>'"
          style="width:100%;height:100%;object-fit:cover;object-position:top center;display:block"/>
      </div>
      <div class="modal-header-info">
        <div class="modal-roll">Roll No. ${s.roll} · Section E</div>
        <div class="modal-name">${title}</div>
        <div class="modal-tags">${modalTag}</div>
      </div>
    </div>

    ${(p&&p.quote)?`
    <div class="modal-quote-block${s.ccr?' ccr-quote':''}">
      <div class="modal-quote">${p.quote}</div>
    </div>`:''}

    ${(p&&p.experience)?`
    <div class="modal-exp-label">✦ Their Section E Story</div>
    <div class="modal-exp">${p.experience}</div>`:''}

    ${(p&&(p.dob||p.email))?`
    <div class="modal-info-grid">
      ${p.dob?`<div class="modal-info-item"><div class="modal-info-label">🎂 Birthday (BS)</div><div class="modal-info-val">${dobStr}</div></div>`:''}
      ${p.email?`<div class="modal-info-item"><div class="modal-info-label">✉️ Email</div><div class="modal-info-val" style="font-size:.74rem;word-break:break-all">${p.email}</div></div>`:''}
    </div>`:''}
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modalOverlay').classList.remove('open'));
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open')});
document.getElementById('searchInput').addEventListener('input',e=>renderGrid(e.target.value));

let _memberPhotos = {};
(async function init(){
  const siteData = await loadSiteData();
  _memberPhotos = siteData.memberPhotos || {};
  renderGrid();
})();
</script>
</body>
</html>
