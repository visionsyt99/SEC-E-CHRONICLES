<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Notices — The E Chronicles</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .page-hero{background:var(--surface);border-bottom:1px solid var(--border);padding:3.5rem 2.5rem 3rem}
    .page-hero-inner{max-width:1100px;margin:0 auto}
    .notices-section{padding:3rem 2.5rem 5rem}
    .notices-inner{max-width:1100px;margin:0 auto}

    .notice-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem;margin-top:2rem}

    .notice-card{
      border-radius:var(--radius);padding:1.5rem;
      border:1px solid transparent;
      position:relative;overflow:hidden;
      transition:transform .25s,box-shadow .25s;
      animation:fadeUp .4s ease both;
    }
    .notice-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
    .notice-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:inherit;filter:brightness(0.7);
    }

    /* color themes */
    .nc-blue  {background:rgba(26,79,160,.08);border-color:rgba(26,79,160,.2)}
    .nc-green {background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.2)}
    .nc-gold  {background:rgba(201,162,39,.08);border-color:rgba(201,162,39,.2)}
    .nc-red   {background:rgba(239,68,68,.08); border-color:rgba(239,68,68,.2)}
    .nc-purple{background:rgba(168,85,247,.08);border-color:rgba(168,85,247,.2)}
    .nc-teal  {background:rgba(20,184,166,.08);border-color:rgba(20,184,166,.2)}

    .nc-blue::before  {background:rgba(26,79,160,.5)}
    .nc-green::before {background:rgba(34,197,94,.5)}
    .nc-gold::before  {background:rgba(201,162,39,.5)}
    .nc-red::before   {background:rgba(239,68,68,.5)}
    .nc-purple::before{background:rgba(168,85,247,.5)}
    .nc-teal::before  {background:rgba(20,184,166,.5)}

    .nc-icon{font-size:1.6rem;margin-bottom:.75rem}
    .nc-title{font-weight:700;font-size:.98rem;margin-bottom:.5rem}
    .nc-desc{font-size:.84rem;color:var(--text2);line-height:1.65;margin-bottom:.9rem}
    .nc-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
    .nc-date{font-family:'DM Mono',monospace;font-size:.66rem;color:var(--text3);letter-spacing:.08em}
    .nc-tag{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:.15rem .55rem;border-radius:4px}

    .nc-blue   .nc-tag{background:rgba(26,79,160,.15); color:var(--accent)}
    .nc-green  .nc-tag{background:rgba(34,197,94,.15); color:#16a34a}
    .nc-gold   .nc-tag{background:rgba(201,162,39,.15);color:var(--gold)}
    .nc-red    .nc-tag{background:rgba(239,68,68,.15); color:#dc2626}
    .nc-purple .nc-tag{background:rgba(168,85,247,.15);color:#9333ea}
    .nc-teal   .nc-tag{background:rgba(20,184,166,.15);color:#0d9488}

    /* pinned badge */
    .pinned-badge{
      position:absolute;top:.8rem;right:.8rem;
      background:var(--gold);color:#fff;
      font-size:.6rem;padding:.15rem .5rem;border-radius:4px;
      font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;
    }

    .empty-state{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--text3);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.2rem}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:600px){.page-hero,.notices-section{padding-left:1.25rem;padding-right:1.25rem}.notice-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="page">
  <div class="page-hero">
    <div class="page-hero-inner reveal">
      <div class="section-label">// Stay informed</div>
      <h1 class="section-title">Notices</h1>
      <p class="section-desc">Important announcements, reminders and updates for Section E.</p>
    </div>
  </div>
  <section class="notices-section">
    <div class="notices-inner">
      <div class="notice-grid reveal" id="noticeGrid"></div>
    </div>
  </section>
</div>
<script src="shared.js"></script>
<script>
injectNav();

const COLOR_CLASSES = ['nc-blue','nc-green','nc-gold','nc-red','nc-purple','nc-teal'];

// _siteData holds admin data loaded from GitHub via loadSiteData()
let _siteData = {};

function renderNotices() {
  const grid = document.getElementById('noticeGrid');
  // Prefer admin data from GitHub; fall back to localStorage
  const notices = (_siteData.notices && _siteData.notices.length)
    ? _siteData.notices
    : JSON.parse(localStorage.getItem('ec_notices') || '[]');
  if (!notices.length) {
    grid.innerHTML = '<div class="empty-state">No notices yet. Check back soon!</div>';
    return;
  }
  // pinned first
  const sorted = [...notices].sort((a,b) => (b.pinned||0)-(a.pinned||0));
  grid.innerHTML = sorted.map((n,i) => {
    const colorClass = COLOR_CLASSES[n.color % COLOR_CLASSES.length];
    return `
    <div class="notice-card ${colorClass}" style="animation-delay:${i*0.07}s">
      ${n.pinned ? '<div class="pinned-badge">📌 Pinned</div>' : ''}
    <div class="nc-icon">${(()=>{const t=document.createElement('textarea');t.innerHTML=n.icon||'📢';return t.value;})()}</div>
      <div class="nc-title">${n.title}</div>
      <div class="nc-desc">${n.desc}</div>
      <div class="nc-footer">
        <div class="nc-date">${n.date}</div>
        <div class="nc-tag">${n.tag || 'General'}</div>
      </div>
    </div>`;
  }).join('');
}

// Wait for GitHub admin data before rendering
(async function init() {
  _siteData = await loadSiteData();
  renderNotices();
})();
</script>
</body>
</html>
