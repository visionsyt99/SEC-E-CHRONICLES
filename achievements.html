<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Achievements — The E Chronicles</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .page-hero{background:var(--surface);border-bottom:1px solid var(--border);padding:3.5rem 2.5rem 3rem}
    .page-hero-inner{max-width:1100px;margin:0 auto}
    .ach-section{padding:3rem 2.5rem 5rem}
    .ach-inner{max-width:1100px;margin:0 auto}
    .ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1.2rem;margin-top:2rem}

    .ach-card{
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      padding:1.5rem;position:relative;overflow:hidden;
      transition:transform .25s,box-shadow .25s,border-color .25s;
      animation:fadeUp .4s ease both;
    }
    .ach-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg);border-color:var(--gold)}
    .ach-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--accent))}

    .ach-trophy{font-size:2rem;margin-bottom:.8rem}
    .ach-name{
      font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;
      margin-bottom:.2rem;
    }
    .ach-title{font-weight:700;font-size:.95rem;color:var(--accent);margin-bottom:.4rem}
    .ach-desc{font-size:.82rem;color:var(--text2);line-height:1.6;margin-bottom:.9rem}
    .ach-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.4rem}
    .ach-date{font-family:'DM Mono',monospace;font-size:.66rem;color:var(--text3)}
    .ach-cat{
      font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;
      padding:.15rem .55rem;border-radius:4px;
      background:var(--gold-light);color:var(--gold);border:1px solid rgba(201,162,39,.25);
    }

    .empty-state{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--text3);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.2rem}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:600px){.page-hero,.ach-section{padding-left:1.25rem;padding-right:1.25rem}.ach-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="page">
  <div class="page-hero">
    <div class="page-hero-inner reveal">
      <div class="section-label">// Our wins</div>
      <h1 class="section-title">🏆 Achievements</h1>
      <p class="section-desc">Celebrating every win — big or small — from the students of Section E.</p>
    </div>
  </div>
  <section class="ach-section">
    <div class="ach-inner">
      <div class="ach-grid reveal" id="achGrid"></div>
    </div>
  </section>
</div>
<script src="shared.js"></script>
<script>
injectNav();

// _siteData holds admin data loaded from GitHub via loadSiteData()
let _siteData = {};

function renderAchievements() {
  const grid = document.getElementById('achGrid');
  // Prefer admin data from GitHub; fall back to localStorage
  const data = (_siteData.achievements && _siteData.achievements.length)
    ? _siteData.achievements
    : JSON.parse(localStorage.getItem('ec_achievements') || '[]');
  if (!data.length) {
    grid.innerHTML = '<div class="empty-state">No achievements added yet. Every win counts — add yours!</div>';
    return;
  }
  grid.innerHTML = data.map((a,i) => `
    <div class="ach-card" style="animation-delay:${i*0.07}s">
      <div class="ach-trophy">${a.emoji || '🏆'}</div>
      <div class="ach-name">${a.name}</div>
      <div class="ach-title">${a.title}</div>
      <div class="ach-desc">${a.desc || ''}</div>
      <div class="ach-footer">
        <div class="ach-date">${a.date}</div>
        <div class="ach-cat">${a.category || 'Achievement'}</div>
      </div>
    </div>`).join('');
}

// Wait for GitHub admin data before rendering
(async function init() {
  _siteData = await loadSiteData();
  renderAchievements();
})();
</script>
</body>
</html>
